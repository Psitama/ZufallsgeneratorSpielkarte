<script>
// Kartenliste

//Forcieren von Karte
let clicks = 0;


//Funktion
function generateCard() {

    card = "‚ô¶ÔłŹ5";
    clicks = 0;
    document.getElementById("forceCard").style.display = "block";
}

document.getElementById("output").innerText = "Deine Karte: " + card;

}

</script>
