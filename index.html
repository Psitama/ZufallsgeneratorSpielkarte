<style>

<script>
// Kartenliste
let cards = [
"вЩ†пЄП2",
"вЩ•пЄПK",
"вЩ£пЄП7",
"вЩ•пЄПD",
"Herz 10",
"Pik 3",
"Karo 9",
"Kreuz 2",
"Joker"
];

//Forcieren von Karte
let clicks = 0;

//verstecktes Men√Љ
let secretClicks =0;

//Funktion
function generateCard() {
document.getElementById("forceCard").style.display = "none";

document.getElementById("title").onclick = function() {

    secretClicks++;

    if (secretClicks == 5) {

    document.getElementById("menu").style.display = "block";

    secretClicks = 0;

};

clicks++

let index = Math.floor(Math.random() * cards.length);
let card = cards[index];

if (clicks == 3) {
    card = "вЩ¶пЄП5";
    clicks = 0;
    document.getElementById("forceCard").style.display = "block";
}

document.getElementById("output").innerText = "Deine Karte: " + card;
document.getElementById("card").innerText = card;
}

</script>
